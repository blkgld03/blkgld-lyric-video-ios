name: BLKGLDLyricVideo
options:
  bundleIdPrefix: com.blkgld
  deploymentTarget:
    iOS: "16.0"

targets:
  BLKGLDLyricVideo:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources/BLKGLDLyricVideo
    info:
      path: Sources/BLKGLDLyricVideo/Info.plist
      properties:
        CFBundleDisplayName: BLKGLD Lyric Video
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blkgld.lyricvideo
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
