name: Build unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Cache XcodeGen (Homebrew)
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/xcodegen
          key: ${{ runner.os }}-brew-xcodegen

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned .app (no code signing)
        run: |
          xcodebuild \
            -project BLKGLDLyricVideo.xcodeproj \
            -scheme BLKGLDLyricVideo \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/BLKGLDLyricVideo.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Package unsigned IPA
        run: |
          set -e
          APP_PATH="build/BLKGLDLyricVideo.xcarchive/Products/Applications/BLKGLDLyricVideo.app"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r BLKGLDLyricVideo-unsigned.ipa Payload
          cd ..

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BLKGLDLyricVideo-unsigned-ipa
          path: build/BLKGLDLyricVideo-unsigned.ipa
          retention-days: 14
