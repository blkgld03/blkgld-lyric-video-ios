name: Build unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # Don't hardcode an Xcode version — runner images rotate which versions are
      # installed. XcodeGen always generates a project in the format of whatever
      # XcodeGen version brew installs (latest), so we need the newest Xcode on
      # the runner to be able to read it, not an older pinned one.
      - name: Select newest available Xcode
        run: |
          ls /Applications | grep Xcode
          LATEST=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n1)
          echo "Selecting: $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version

      - name: Cache XcodeGen (Homebrew)
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/xcodegen
          key: ${{ runner.os }}-brew-xcodegen

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned .app (no code signing)
        run: |
          xcodebuild \
            -project BLKGLDLyricVideo.xcodeproj \
            -scheme BLKGLDLyricVideo \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/BLKGLDLyricVideo.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Package unsigned IPA
        run: |
          set -e
          APP_PATH="build/BLKGLDLyricVideo.xcarchive/Products/Applications/BLKGLDLyricVideo.app"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r BLKGLDLyricVideo-unsigned.ipa Payload
          cd ..

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BLKGLDLyricVideo-unsigned-ipa
          path: build/BLKGLDLyricVideo-unsigned.ipa
          retention-days: 14
